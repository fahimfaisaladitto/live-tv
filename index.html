<body>

    <header>
        <div class="headerBtn" id="backBtn">⟵ Back</div>
        <div class="title">Biostar TV World</div>
        <div class="headerBtn" id="searchBtn">🔍</div>
    </header>

    <div id="searchBox">
        <input id="searchInput" placeholder="Search channel...">
    </div>

    <div id="main">
        <div id="left">
            <div id="videoWrap">
                <video id="video" playsinline></video>

                <div id="controls">
                    <div class="leftCtrl">
                        <button id="btnPlay">▶</button>
                        <button id="btnMute">🔊</button>
                        <input id="vol" type="range" min="0" max="1" step="0.01" value="1">
                    </div>

                    <div class="rightCtrl">
                        <span id="live">LIVE</span>
                        <button id="btnHd">HD</button>
                        <button id="btnShare">🔗</button>
                        <button id="btnFull">⛶</button>
                    </div>
                </div>
            </div>

            <div id="currentInfo">
                <img id="currentLogo">
                <span id="currentName">Select a Channel</span>
            </div>
        </div>

        <div id="right">
            <div id="category"></div>
            <div id="list"></div>
        </div>
    </div>
